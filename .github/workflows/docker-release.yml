name: Test & Build Release - Frontend

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check (TypeScript Validation)
        run: npm run type-check

      - name: Build Check (Production Simulation)
        run: npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Pack Docker Image
        run: |
          docker build --target production -t sims-frontend:latest .
          docker save -o sims-frontend-latest.tar sims-frontend:latest

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Production Build
          files: sims-frontend-latest.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
