name: Test & Build Release - Frontend

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check (TypeScript Validation)
        continue-on-error: true # Permite que el job siga aunque este paso falle
        run: npm run type-check

      - name: Build Check (Production Simulation)
        run: npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Pack Docker Image (AMD64 - Intel/Windows/Old Macs)
        run: |
          docker buildx build --platform linux/amd64 --target production -t sims-frontend:latest-amd64 --load .
          docker save -o sims-frontend-amd64.tar sims-frontend:latest-amd64

      - name: Build and Pack Docker Image (ARM64 - Apple Silicon M1/M2/M3)
        run: |
          docker buildx build --platform linux/arm64 --target production -t sims-frontend:latest-arm64 --load .
          docker save -o sims-frontend-arm64.tar sims-frontend:latest-arm64

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Production Build
          files: |
            sims-frontend-amd64.tar
            sims-frontend-arm64.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
