services:
  # Entorno de Desarrollo (Vite + HMR)
  frontend-dev:
    build:
      context: .
      target: development
    container_name: sims-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
    networks:
      - frontend-network

  # Entorno de Producción (Nginx)
  frontend-prod:
    build:
      context: .
      target: production
    container_name: sims-frontend-prod
    ports:
      - "8080:80"
    networks:
      - frontend-network

networks:
  frontend-network:
    driver: bridge
